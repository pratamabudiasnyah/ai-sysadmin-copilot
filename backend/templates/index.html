<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SysAdmin Copilot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .header { background: #1e293b; padding: 20px 40px; border-bottom: 1px solid #334155; }
        .header h1 { color: #38bdf8; font-size: 24px; }
        .header p { color: #94a3b8; font-size: 14px; margin-top: 4px; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .card { background: #1e293b; border-radius: 12px; padding: 30px; margin-bottom: 24px; border: 1px solid #334155; }
        .card h2 { color: #38bdf8; margin-bottom: 20px; font-size: 18px; }
        .upload-area { border: 2px dashed #475569; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #38bdf8; background: #0f172a; }
        .upload-area input { display: none; }
        .upload-area label { cursor: pointer; }
        .upload-icon { font-size: 48px; margin-bottom: 12px; }
        .upload-text { color: #94a3b8; margin-bottom: 8px; }
        .upload-hint { color: #64748b; font-size: 13px; }
        .btn { background: #0284c7; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 15px; cursor: pointer; width: 100%; margin-top: 16px; transition: background 0.2s; }
        .btn:hover { background: #0369a1; }
        .btn:disabled { background: #475569; cursor: not-allowed; }
        .result { background: #0f172a; border-radius: 8px; padding: 20px; margin-top: 20px; border: 1px solid #334155; display: none; }
        .result h3 { color: #38bdf8; margin-bottom: 12px; }
        .result pre { white-space: pre-wrap; word-wrap: break-word; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; line-height: 1.6; }
        .status { padding: 8px 16px; border-radius: 6px; font-size: 14px; margin-top: 12px; display: none; }
        .status.loading { background: #1e3a5f; color: #38bdf8; display: block; }
        .status.error { background: #450a0a; color: #fca5a5; display: block; }
        .file-selected { color: #38bdf8; margin-top: 8px; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🖥️ AI SysAdmin Copilot</h1>
        <p>AI-powered Linux & Infrastructure Assistant</p>
    </div>
    <div class="container">
        <div class="card">
            <h2>📋 Analisis Log Server</h2>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📁</div>
                <label>
                    <p class="upload-text">Klik untuk pilih file log</p>
                    <p class="upload-hint">Format yang didukung: .log, .txt</p>
                </label>
                <input type="file" id="fileInput" accept=".log,.txt" onchange="fileSelected(this)">
            </div>
            <p class="file-selected" id="fileSelected"></p>
            <button class="btn" id="analyzeBtn" onclick="analyzeLog()" disabled>🔍 Analisis dengan AI</button>
            <div class="status" id="status">⏳ Menganalisis log, mohon tunggu...</div>
            <div class="result" id="result">
                <h3>📊 Hasil Analisis AI</h3>
                <pre id="resultText"></pre>
            </div>
        </div>
    </div>
    <script>
        function fileSelected(input) {
            if (input.files && input.files[0]) {
                document.getElementById('fileSelected').style.display = 'block';
                document.getElementById('fileSelected').textContent = '✅ File dipilih: ' + input.files[0].name;
                document.getElementById('analyzeBtn').disabled = false;
            }
        }
        async function analyzeLog() {
            const fileInput = document.getElementById('fileInput');
            const btn = document.getElementById('analyzeBtn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            if (!fileInput.files[0]) return;
            btn.disabled = true;
            status.className = 'status loading';
            status.textContent = '⏳ Menganalisis log, mohon tunggu...';
            result.style.display = 'none';
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            try {
                const response = await fetch('/analyze-log', { method: 'POST', body: formData });
                const data = await response.json();
                if (response.ok) {
                    status.style.display = 'none';
                    result.style.display = 'block';
                    document.getElementById('resultText').textContent = data.analysis;
                } else {
                    status.className = 'status error';
                    status.textContent = '❌ Error: ' + (data.detail || 'Terjadi kesalahan');
                }
            } catch (err) {
                status.className = 'status error';
                status.textContent = '❌ Gagal terhubung ke server';
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
